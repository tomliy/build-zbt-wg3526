name: Build OpenWrt for ZBT-WG3526

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Clone OpenWrt 23.05 source
        run: |
          git clone --depth=1 --branch=openwrt-23.05 \
            https://github.com/openwrt/openwrt.git source

      - name: Fix DTS EEPROM offsets
        run: |
          python3 scripts/fix-dts.py \
            source/target/linux/ramips/dts/mt7621_zbtlink_zbt-wg3526.dtsi

      - name: Configure
        run: |
          cd source
          cat > .config << 'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_zbtlink_zbt-wg3526-16m=y
          CONFIG_PACKAGE_kmod-mt7603e=y
          CONFIG_PACKAGE_kmod-mt76x2e=y
          EOF
          make defconfig

      - name: Download dependencies
        run: |
          cd source
          make download -j4
          find dl -size -1024c -exec ls -l {} \;

      - name: Build toolchain
        run: |
          cd source
          make tools/install -j$(nproc)
          make toolchain/install -j$(nproc)

      - name: Build target
        run: |
          cd source
          make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-zbt-wg3526-firmware
          path: source/bin/targets/ramips/mt7621/*.bin
